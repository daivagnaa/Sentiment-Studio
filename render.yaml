services:
  - type: web
    name: sentiment-studio
    env: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn -w 1 --threads 2 --timeout 120 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CUDA_VISIBLE_DEVICES
        value: "-1"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"